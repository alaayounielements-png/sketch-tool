<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Architect Sketch Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;background:#1a1a2e;}

/* LAUNCHER */
#launcher{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
#launcher h1{color:#e2e8f0;font-size:22px;font-weight:700;}
#launcher p{color:#64748b;font-size:13px;}
#launch-btn{padding:16px 44px;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;}
#launch-btn:hover{background:#6d28d9;}

/* APP */
#app{display:none;flex-direction:column;width:100%;height:100%;}

/* Topbar */
#topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:#16213e;padding:7px 14px;border-bottom:1px solid #0f3460;}
.logo{display:flex;align-items:center;gap:8px;color:#e2e8f0;font-size:14px;font-weight:600;}
.actions{display:flex;gap:6px;align-items:center;}
.hint{color:#475569;font-size:11px;background:#0f172a;padding:3px 8px;border-radius:5px;border:1px solid #1e293b;}
.btn{padding:6px 12px;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer;}
.bg{background:#334155;color:#cbd5e1;}.bg:hover{background:#475569;}
.bb{background:#1e40af;color:#fff;}.bb:hover{background:#1d4ed8;}
.bp{background:#7c3aed;color:#fff;}.bp:hover{background:#6d28d9;}

/* Canvas area */
#wrap{flex:1;position:relative;overflow:hidden;background:#f8fafc;}
canvas{position:absolute;top:0;left:0;}
#cg{z-index:0;}
#cd{z-index:1;cursor:crosshair;}

/* Sidebar */
#sb{position:absolute;left:10px;top:50%;transform:translateY(-50%);z-index:10;background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:7px 5px;display:flex;flex-direction:column;gap:3px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.tb{width:38px;height:38px;border-radius:7px;border:none;background:transparent;color:#94a3b8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tb:hover{background:#1e3a5f;color:#e2e8f0;}
.tb.on{background:#7c3aed;color:#fff;}
.td{height:1px;background:#1e3a5f;margin:2px 4px;}

/* Color panel */
#cp{position:absolute;left:58px;bottom:10px;z-index:10;background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.lb{color:#64748b;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
#sw{display:flex;gap:4px;flex-wrap:wrap;max-width:130px;}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.sw:hover{transform:scale(1.2);}
.sw.on{border-color:#e2e8f0;}
#wr{display:flex;gap:4px;}
.wo{width:30px;height:22px;border-radius:4px;cursor:pointer;background:#0f172a;border:1px solid #1e293b;display:flex;align-items:center;justify-content:center;}
.wo:hover,.wo.on{border-color:#7c3aed;background:#1e1b4b;}
.wo span{background:#94a3b8;border-radius:1px;width:16px;display:block;}

#toast{position:fixed;bottom:16px;right:16px;background:#16a34a;color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="launcher">
  <div style="font-size:56px;">🏗️</div>
  <h1>Architect Sketch Tool</h1>
  <p>Click to open the sketch window</p>
  <button id="launch-btn" onclick="doLaunch()">🎨 Open Sketch Window</button>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo">🏗️ Architect Sketch Tool</div>
    <div class="actions">
      <span class="hint">Ctrl+Z Undo | Ctrl+S Save | Del Clear</span>
      <button class="btn bg" onclick="undo()">↩ Undo</button>
      <button class="btn bg" onclick="clearAll()">🗑 Clear</button>
      <button class="btn bb" onclick="savePNG()">💾 Save PNG</button>
      <button class="btn bp" onclick="savePNG()">⬇ Download</button>
    </div>
  </div>
  <div id="wrap">
    <canvas id="cg"></canvas>
    <canvas id="cd"></canvas>
    <div id="sb">
      <button class="tb on" id="t-pen"    onclick="setTool('pen')">✏️</button>
      <button class="tb"    id="t-line"   onclick="setTool('line')">📏</button>
      <button class="tb"    id="t-rect"   onclick="setTool('rect')">⬜</button>
      <button class="tb"    id="t-circle" onclick="setTool('circle')">⭕</button>
      <button class="tb"    id="t-arrow"  onclick="setTool('arrow')">➡️</button>
      <button class="tb"    id="t-text"   onclick="setTool('text')">🔤</button>
      <div class="td"></div>
      <button class="tb"    id="t-eraser" onclick="setTool('eraser')">🧹</button>
    </div>
    <div id="cp">
      <div class="lb">Color</div>
      <div id="sw"></div>
      <input type="color" id="cc" value="#1e3a5f" style="width:100%;height:22px;border:none;border-radius:4px;cursor:pointer;" oninput="setColor(this.value)"/>
      <div class="lb">Stroke</div>
      <div id="wr"></div>
    </div>
  </div>
</div>

<div id="toast">✅ PNG Saved!</div>

<script>
const POPUP = new URLSearchParams(location.search).get('popup')==='1';

function doLaunch(){
  const w=1100,h=700,l=Math.round((screen.width-w)/2),t=Math.round((screen.height-h)/2);
  const pop=window.open(location.href.split('?')[0]+'?popup=1','ArchSketch',
    `width=${w},height=${h},left=${l},top=${t},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no`);
  if(pop){ setTimeout(()=>window.close(),300); }
  else { document.getElementById('launcher').style.display='flex'; } // blocked fallback
}

if(POPUP){
  document.getElementById('launcher').style.display='none';
  document.getElementById('app').style.display='flex';
  init();
} else {
  // Auto-launch popup immediately — works when tab was opened by a user click
  document.getElementById('launcher').style.display='none';
  doLaunch();
}

function init(){
  const wrap=document.getElementById('wrap');
  const gC=document.getElementById('cg'), dC=document.getElementById('cd');
  const gX=gC.getContext('2d'), dX=dC.getContext('2d');
  const COLS=['#1e3a5f','#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#ffffff','#94a3b8','#000000'];
  const WS=[1,2,4,8];
  let tool='pen',col='#1e3a5f',lw=2,drawing=false,sx=0,sy=0,snap=null,stack=[];

  function resize(){
    const W=wrap.clientWidth,H=wrap.clientHeight;
    [gC,dC].forEach(c=>{c.width=W;c.height=H;});
    grid();
  }
  window.addEventListener('resize',resize);
  resize();

  function grid(){
    const W=gC.width,H=gC.height;
    gX.fillStyle='#f8fafc';gX.fillRect(0,0,W,H);
    gX.strokeStyle='#e2e8f0';gX.lineWidth=0.5;
    for(let x=0;x<=W;x+=20){gX.beginPath();gX.moveTo(x,0);gX.lineTo(x,H);gX.stroke();}
    for(let y=0;y<=H;y+=20){gX.beginPath();gX.moveTo(0,y);gX.lineTo(W,y);gX.stroke();}
    gX.strokeStyle='#bfdbfe';gX.lineWidth=1;
    for(let x=0;x<=W;x+=100){gX.beginPath();gX.moveTo(x,0);gX.lineTo(x,H);gX.stroke();}
    for(let y=0;y<=H;y+=100){gX.beginPath();gX.moveTo(0,y);gX.lineTo(W,y);gX.stroke();}
  }

  // Build swatches
  COLS.forEach(c=>{
    const d=document.createElement('div');
    d.className='sw'+(c===col?' on':'');
    d.style.background=c;d.dataset.c=c;
    if(c==='#ffffff')d.style.boxShadow='inset 0 0 0 1px #64748b';
    d.onclick=()=>setColor(c);
    document.getElementById('sw').appendChild(d);
  });
  WS.forEach(w=>{
    const d=document.createElement('div');
    d.className='wo'+(w===lw?' on':'');d.dataset.w=w;d.onclick=()=>setWidth(w);
    const s=document.createElement('span');s.style.height=w+'px';
    d.appendChild(s);document.getElementById('wr').appendChild(d);
  });

  window.setColor=c=>{col=c;document.getElementById('cc').value=c;document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.dataset.c===c));};
  window.setWidth=w=>{lw=w;document.querySelectorAll('.wo').forEach(d=>d.classList.toggle('on',+d.dataset.w===w));};
  window.setTool=t=>{tool=t;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));document.getElementById('t-'+t)?.classList.add('on');};

  function pt(e){const r=dC.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  function pushU(){stack.push(dX.getImageData(0,0,dC.width,dC.height));if(stack.length>30)stack.shift();}

  dC.addEventListener('mousedown',e=>{
    if(tool==='text'){const p=pt(e);const t=prompt('Text:');if(!t)return;pushU();dX.font=`${Math.max(lw*6,14)}px system-ui`;dX.fillStyle=col;dX.fillText(t,p.x,p.y);return;}
    drawing=true;const p=pt(e);sx=p.x;sy=p.y;pushU();
    if(tool==='pen'||tool==='eraser'){dX.beginPath();dX.moveTo(p.x,p.y);}
    else snap=dX.getImageData(0,0,dC.width,dC.height);
  });
  dC.addEventListener('mousemove',e=>{
    if(!drawing)return;const p=pt(e);
    dX.lineCap='round';dX.lineJoin='round';
    if(tool==='pen'){dX.strokeStyle=col;dX.lineWidth=lw;dX.lineTo(p.x,p.y);dX.stroke();}
    else if(tool==='eraser'){dX.strokeStyle='#f8fafc';dX.lineWidth=22;dX.lineTo(p.x,p.y);dX.stroke();}
    else{dX.putImageData(snap,0,0);shape(p.x,p.y);}
  });
  dC.addEventListener('mouseup',()=>{drawing=false;snap=null;});
  dC.addEventListener('mouseleave',()=>{drawing=false;snap=null;});
  dC.addEventListener('touchstart',e=>{e.preventDefault();dC.dispatchEvent(new MouseEvent('mousedown',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}));},{passive:false});
  dC.addEventListener('touchmove', e=>{e.preventDefault();dC.dispatchEvent(new MouseEvent('mousemove', {clientX:e.touches[0].clientX,clientY:e.touches[0].clientY}));},{passive:false});
  dC.addEventListener('touchend',()=>dC.dispatchEvent(new MouseEvent('mouseup')));

  function shape(ex,ey){
    dX.strokeStyle=col;dX.lineWidth=lw;dX.lineCap='round';dX.beginPath();
    if(tool==='line'){dX.moveTo(sx,sy);dX.lineTo(ex,ey);dX.stroke();}
    else if(tool==='rect'){dX.strokeRect(sx,sy,ex-sx,ey-sy);}
    else if(tool==='circle'){const rx=(ex-sx)/2,ry=(ey-sy)/2;dX.ellipse(sx+rx,sy+ry,Math.abs(rx),Math.abs(ry),0,0,2*Math.PI);dX.stroke();}
    else if(tool==='arrow'){
      dX.moveTo(sx,sy);dX.lineTo(ex,ey);dX.stroke();
      const a=Math.atan2(ey-sy,ex-sx),al=14;
      dX.beginPath();
      dX.moveTo(ex,ey);dX.lineTo(ex-al*Math.cos(a-.4),ey-al*Math.sin(a-.4));
      dX.moveTo(ex,ey);dX.lineTo(ex-al*Math.cos(a+.4),ey-al*Math.sin(a+.4));
      dX.stroke();
    }
  }

  window.undo=()=>{if(stack.length)dX.putImageData(stack.pop(),0,0);};
  window.clearAll=()=>{if(!confirm('Clear?'))return;stack=[];dX.clearRect(0,0,dC.width,dC.height);};
  window.savePNG=()=>{
    const m=document.createElement('canvas');m.width=dC.width;m.height=dC.height;
    const mc=m.getContext('2d');mc.drawImage(gC,0,0);mc.drawImage(dC,0,0);
    const a=document.createElement('a');
    a.download='sketch_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.png';
    a.href=m.toDataURL('image/png');a.click();
    const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
  };

  document.addEventListener('keydown',e=>{
    if(e.ctrlKey&&e.key==='s'){e.preventDefault();savePNG();}
    if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
    if((e.key==='Delete'||e.key==='Backspace')&&document.activeElement===document.body)clearAll();
    ({p:'pen',l:'line',r:'rect',c:'circle',a:'arrow',t:'text',e:'eraser'})[e.key]&&setTool(({p:'pen',l:'line',r:'rect',c:'circle',a:'arrow',t:'text',e:'eraser'})[e.key]);
  });
}
</script>
</body>
</html>
