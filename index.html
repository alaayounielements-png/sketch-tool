<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Architect Sketch Tool</title>
  <script>
    // If opened in a full tab (not already a popup), auto-launch as popup
    const isPopup = new URLSearchParams(location.search).get('popup');
    if (!isPopup) {
      const w = 1100, h = 680;
      const left = Math.round((screen.width - w) / 2);
      const top  = Math.round((screen.height - h) / 2);
      window.open(
        location.href + '?popup=1',
        'ArchitectSketch',
        `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no`
      );
      // Show a simple close prompt in the original tab
      document.addEventListener('DOMContentLoaded', () => {
        document.body.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;
            background:#1a1a2e;color:#e2e8f0;font-family:system-ui;gap:16px;">
            <div style="font-size:48px;">🏗️</div>
            <div style="font-size:18px;font-weight:600;">Architect Sketch Tool opened!</div>
            <div style="font-size:13px;color:#64748b;">You can close this tab.</div>
            <button onclick="window.close()"
              style="margin-top:8px;padding:10px 24px;background:#7c3aed;color:#fff;border:none;
              border-radius:8px;font-size:14px;cursor:pointer;">Close this tab</button>
          </div>`;
      });
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; height: 100vh; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      padding: 8px 16px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      z-index: 10;
    }
    #topbar .logo {
      display: flex; align-items: center; gap: 10px;
      color: #e2e8f0; font-size: 15px; font-weight: 600;
    }
    #topbar .logo svg { width: 26px; height: 26px; }
    #topbar .actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary { background: #1e40af; color: #fff; }
    .btn-secondary:hover { background: #1d4ed8; }
    .btn-ghost { background: #334155; color: #cbd5e1; }
    .btn-ghost:hover { background: #475569; }

    .shortcut-hint {
      color: #64748b; font-size: 11px;
      background: #0f172a; padding: 3px 8px; border-radius: 5px;
      border: 1px solid #1e293b;
    }

    /* ── Canvas area ── */
    #canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      cursor: crosshair;
    }
    #grid-canvas { z-index: 0; }
    #draw-canvas { z-index: 1; }
    #preview-canvas { z-index: 2; pointer-events: none; }

    /* ── Tool sidebar ── */
    #sidebar {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .tool-btn {
      width: 40px; height: 40px;
      border-radius: 8px; border: none;
      background: transparent; color: #94a3b8;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; position: relative;
    }
    .tool-btn:hover { background: #1e3a5f; color: #e2e8f0; }
    .tool-btn.active { background: #7c3aed; color: #fff; }
    .tool-btn[title]:hover::after {
      content: attr(title);
      position: absolute;
      left: 48px; top: 50%; transform: translateY(-50%);
      background: #0f172a; color: #e2e8f0;
      padding: 4px 8px; border-radius: 6px;
      font-size: 11px; white-space: nowrap;
      border: 1px solid #1e293b;
      pointer-events: none;
    }
    .tool-divider { height: 1px; background: #1e3a5f; margin: 2px 4px; }

    /* ── Color + width panel ── */
    #color-panel {
      position: absolute;
      left: 62px; bottom: 12px;
      z-index: 10;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
    .panel-label { color: #64748b; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .swatches { display: flex; gap: 5px; flex-wrap: wrap; max-width: 140px; }
    .swatch {
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform .1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #e2e8f0; }
    .width-row { display: flex; gap: 5px; align-items: center; }
    .width-opt {
      cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 24px;
      background: #0f172a; border: 1px solid #1e293b;
      transition: all .15s;
    }
    .width-opt:hover, .width-opt.active { border-color: #7c3aed; background: #1e1b4b; }
    .width-opt span { background: #94a3b8; border-radius: 2px; width: 18px; display: block; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #16a34a; color: #fff;
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      opacity: 0; transition: opacity .3s;
      pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div id="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Architect Sketch Tool
  </div>
  <div class="actions">
    <span class="shortcut-hint">Ctrl+Z Undo &nbsp;|&nbsp; Ctrl+S Save PNG &nbsp;|&nbsp; Del Clear</span>
    <button class="btn btn-ghost" onclick="undoLast()">↩ Undo</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑 Clear</button>
    <button class="btn btn-secondary" onclick="savePNG()">💾 Save PNG</button>
    <button class="btn btn-primary" onclick="savePNG()">⬇ Download</button>
  </div>
</div>

<!-- ── CANVAS AREA ── -->
<div id="canvas-wrapper">
  <canvas id="grid-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>
  <canvas id="preview-canvas"></canvas>

  <!-- TOOL SIDEBAR -->
  <div id="sidebar">
    <button class="tool-btn active" id="tool-pen"    onclick="setTool('pen')"    title="Pen (P)">✏️</button>
    <button class="tool-btn"        id="tool-line"   onclick="setTool('line')"   title="Line (L)">📏</button>
    <button class="tool-btn"        id="tool-rect"   onclick="setTool('rect')"   title="Rectangle (R)">⬜</button>
    <button class="tool-btn"        id="tool-circle" onclick="setTool('circle')" title="Circle (C)">⭕</button>
    <button class="tool-btn"        id="tool-arrow"  onclick="setTool('arrow')"  title="Arrow (A)">➡️</button>
    <button class="tool-btn"        id="tool-text"   onclick="setTool('text')"   title="Text (T)">🔤</button>
    <div class="tool-divider"></div>
    <button class="tool-btn"        id="tool-eraser" onclick="setTool('eraser')" title="Eraser (E)">🧹</button>
  </div>

  <!-- COLOR + WIDTH PANEL -->
  <div id="color-panel">
    <div class="panel-label">Color</div>
    <div class="swatches" id="swatches"></div>
    <input type="color" id="customColor" value="#1e3a5f"
      style="width:100%;height:24px;border:none;border-radius:4px;cursor:pointer;background:none;"
      oninput="setColor(this.value)" title="Custom color"/>

    <div class="panel-label" style="margin-top:4px;">Stroke</div>
    <div class="width-row" id="widths"></div>
  </div>
</div>

<div id="toast">✅ PNG Saved!</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const COLORS = ['#1e3a5f','#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#ffffff','#94a3b8','#000000'];
const WIDTHS  = [1, 2, 4, 8];

let activeTool  = 'pen';
let activeColor = '#1e3a5f';
let lineWidth   = 2;
let isDrawing   = false;
let startX = 0, startY = 0;
let snapshot = null;
let undoStack = [];

// ── Canvas setup ───────────────────────────────────────────────────────────
const wrapper  = document.getElementById('canvas-wrapper');
const gridCvs  = document.getElementById('grid-canvas');
const drawCvs  = document.getElementById('draw-canvas');
const prevCvs  = document.getElementById('preview-canvas');
const gctx     = gridCvs.getContext('2d');
const dctx     = drawCvs.getContext('2d');
const pctx     = prevCvs.getContext('2d');

function resize() {
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;
  [gridCvs, drawCvs, prevCvs].forEach(c => { c.width = w; c.height = h; });
  drawGrid();
}

window.addEventListener('resize', resize);
resize();

// ── Grid ───────────────────────────────────────────────────────────────────
function drawGrid() {
  const w = gridCvs.width, h = gridCvs.height;
  gctx.fillStyle = '#f8fafc';
  gctx.fillRect(0, 0, w, h);
  gctx.strokeStyle = '#e2e8f0'; gctx.lineWidth = 0.5;
  for (let x = 0; x < w; x += 20) { gctx.beginPath(); gctx.moveTo(x,0); gctx.lineTo(x,h); gctx.stroke(); }
  for (let y = 0; y < h; y += 20) { gctx.beginPath(); gctx.moveTo(0,y); gctx.lineTo(w,y); gctx.stroke(); }
  gctx.strokeStyle = '#bfdbfe'; gctx.lineWidth = 1;
  for (let x = 0; x < w; x += 100) { gctx.beginPath(); gctx.moveTo(x,0); gctx.lineTo(x,h); gctx.stroke(); }
  for (let y = 0; y < h; y += 100) { gctx.beginPath(); gctx.moveTo(0,y); gctx.lineTo(w,y); gctx.stroke(); }
}

// ── Tool bar setup ─────────────────────────────────────────────────────────
function buildSwatches() {
  const el = document.getElementById('swatches');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c === activeColor ? ' active' : '');
    d.style.background = c;
    d.style.border = c === '#ffffff' ? '2px solid #94a3b8' : '';
    d.onclick = () => setColor(c);
    d.dataset.color = c;
    el.appendChild(d);
  });
}

function buildWidths() {
  const el = document.getElementById('widths');
  WIDTHS.forEach(w => {
    const d = document.createElement('div');
    d.className = 'width-opt' + (w === lineWidth ? ' active' : '');
    d.dataset.w = w;
    d.onclick = () => setWidth(w);
    const s = document.createElement('span');
    s.style.height = w + 'px';
    d.appendChild(s);
    el.appendChild(d);
  });
}

buildSwatches();
buildWidths();

function setColor(c) {
  activeColor = c;
  document.getElementById('customColor').value = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === c));
}

function setWidth(w) {
  lineWidth = w;
  document.querySelectorAll('.width-opt').forEach(d => d.classList.toggle('active', +d.dataset.w === w));
}

function setTool(t) {
  activeTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t)?.classList.add('active');
}

// ── Drawing ────────────────────────────────────────────────────────────────
function getPos(e) {
  const r = drawCvs.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function pushUndo() {
  undoStack.push(dctx.getImageData(0, 0, drawCvs.width, drawCvs.height));
  if (undoStack.length > 30) undoStack.shift();
}

drawCvs.addEventListener('mousedown', e => {
  if (activeTool === 'text') { handleText(getPos(e)); return; }
  isDrawing = true;
  const p = getPos(e);
  startX = p.x; startY = p.y;
  pushUndo();
  if (activeTool === 'pen' || activeTool === 'eraser') {
    dctx.beginPath(); dctx.moveTo(p.x, p.y);
  } else {
    snapshot = dctx.getImageData(0, 0, drawCvs.width, drawCvs.height);
  }
});

drawCvs.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const p = getPos(e);
  dctx.lineCap = 'round'; dctx.lineJoin = 'round';

  if (activeTool === 'pen') {
    dctx.strokeStyle = activeColor; dctx.lineWidth = lineWidth;
    dctx.lineTo(p.x, p.y); dctx.stroke();
  } else if (activeTool === 'eraser') {
    dctx.strokeStyle = '#f8fafc'; dctx.lineWidth = 20;
    dctx.lineTo(p.x, p.y); dctx.stroke();
  } else {
    dctx.putImageData(snapshot, 0, 0);
    drawShape(dctx, p.x, p.y);
  }
});

drawCvs.addEventListener('mouseup', () => { isDrawing = false; snapshot = null; });
drawCvs.addEventListener('mouseleave', () => { isDrawing = false; snapshot = null; });

function drawShape(ctx, ex, ey) {
  ctx.strokeStyle = activeColor;
  ctx.lineWidth = lineWidth;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if (activeTool === 'line') {
    ctx.moveTo(startX, startY); ctx.lineTo(ex, ey); ctx.stroke();
  } else if (activeTool === 'rect') {
    ctx.strokeRect(startX, startY, ex - startX, ey - startY);
  } else if (activeTool === 'circle') {
    const rx = (ex - startX) / 2, ry = (ey - startY) / 2;
    ctx.ellipse(startX + rx, startY + ry, Math.abs(rx), Math.abs(ry), 0, 0, 2 * Math.PI);
    ctx.stroke();
  } else if (activeTool === 'arrow') {
    ctx.moveTo(startX, startY); ctx.lineTo(ex, ey); ctx.stroke();
    const angle = Math.atan2(ey - startY, ex - startX);
    const al = 15;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - al * Math.cos(angle - 0.4), ey - al * Math.sin(angle - 0.4));
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - al * Math.cos(angle + 0.4), ey - al * Math.sin(angle + 0.4));
    ctx.stroke();
  }
}

// ── Text tool ──────────────────────────────────────────────────────────────
function handleText(p) {
  const txt = prompt('Enter text:');
  if (!txt) return;
  pushUndo();
  dctx.font = `${Math.max(lineWidth * 6, 14)}px system-ui`;
  dctx.fillStyle = activeColor;
  dctx.fillText(txt, p.x, p.y);
}

// ── Touch support ──────────────────────────────────────────────────────────
drawCvs.addEventListener('touchstart',  e => { e.preventDefault(); drawCvs.dispatchEvent(new MouseEvent('mousedown', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, { passive: false });
drawCvs.addEventListener('touchmove',   e => { e.preventDefault(); drawCvs.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY })); }, { passive: false });
drawCvs.addEventListener('touchend',    e => { drawCvs.dispatchEvent(new MouseEvent('mouseup')); });

// ── Actions ────────────────────────────────────────────────────────────────
function undoLast() {
  if (!undoStack.length) return;
  dctx.putImageData(undoStack.pop(), 0, 0);
}

function clearAll() {
  if (!confirm('Clear the canvas?')) return;
  undoStack = [];
  dctx.clearRect(0, 0, drawCvs.width, drawCvs.height);
}

function savePNG() {
  // Merge grid + drawing into one image
  const merged = document.createElement('canvas');
  merged.width  = drawCvs.width;
  merged.height = drawCvs.height;
  const mctx = merged.getContext('2d');
  mctx.drawImage(gridCvs, 0, 0);
  mctx.drawImage(drawCvs, 0, 0);

  const link = document.createElement('a');
  link.download = 'sketch_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.png';
  link.href = merged.toDataURL('image/png');
  link.click();

  // Toast
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); savePNG(); return; }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoLast(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') { if (document.activeElement === document.body) clearAll(); return; }
  if (e.key === 'p') setTool('pen');
  if (e.key === 'l') setTool('line');
  if (e.key === 'r') setTool('rect');
  if (e.key === 'c') setTool('circle');
  if (e.key === 'a') setTool('arrow');
  if (e.key === 't') setTool('text');
  if (e.key === 'e') setTool('eraser');
});
</script>
</body>
</html>
